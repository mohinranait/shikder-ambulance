server {
    listen 80;
    server_name shikderambulance.com www.shikderambulance.com;

    # Required for certbot webroot renewal (works alongside nginx)
    location ^~ /.well-known/acme-challenge/ {
        alias /var/www/certbot/.well-known/acme-challenge/;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://shikderambulance.com$request_uri;
    }
}

# Redirect HTTPS www → non-www
server {
    listen 443 ssl;
    server_name www.shikderambulance.com;

    ssl_certificate     /etc/letsencrypt/live/shikderambulance.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shikderambulance.com/privkey.pem;

    return 301 https://shikderambulance.com$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl;
    server_name shikderambulance.com;

    ssl_certificate     /etc/letsencrypt/live/shikderambulance.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shikderambulance.com/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;

    location / {
        proxy_pass http://localhost:3001;

        proxy_http_version 1.1;
        proxy_set_header Upgrade            $http_upgrade;
        proxy_set_header Connection         "upgrade";
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        proxy_buffering    off;
        proxy_read_timeout 60s;
    }
}
